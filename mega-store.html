<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="android-compat.css?v=20260410a" />
  <title>ElectroMart Mega Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="mega-store.css?v=20260314b" />
  <link rel="stylesheet" href="listing-filter-chips.css?v=20260314c" />
  <link rel="stylesheet" href="shared-search.css?v=20260314g" />
  <script src="android-compat.js?v=20260410a"></script>
</head>
<body>
  <header class="page-header">
    <a href="index.html" class="brand">ElectroMart</a>
    <nav class="header-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="auth.html">Account</a>
      <a href="orders.html">Orders</a>
      <a href="terms-and-conditions.html">Terms</a>
      <a href="shipping-policy.html">Shipping</a>
      <a href="refund-policy.html">Refund</a>
      <a href="accessibility-statement.html">Accessibility</a>
      <a href="faq.html">FAQ</a>
      <a href="review.html">Review</a>
      <a href="cart.html">Cart <span id="cartCount">0</span></a>
    </nav>
  </header>

  <main class="store-main">
    <section class="hero">
      <p class="eyebrow">Mega Store Experience</p>
      <h1>Visit ElectroMart Mega Stores</h1>
      <p>Discover premium showrooms, same-day pickup, demo zones, and business counters.</p>
    </section>

    <section class="filters">
      <input id="storeSearch" type="search" placeholder="Search city or service" aria-label="Search stores" />
      <div id="serviceFilterList" class="service-filter-list" role="group" aria-label="Filter by service">
        <p class="service-filter-empty">Loading services...</p>
      </div>
    </section>

    <section class="store-panel">
      <div class="panel-head">
        <h2>Mega Store Locations</h2>
        <p id="storeMeta" role="status" aria-live="polite" aria-atomic="true">Showing 0 stores</p>
      </div>
      <div id="storeGrid" class="store-grid"></div>
    </section>
  </main>

  <script src="listing-filter-chips.js?v=20260314c"></script>
  <script src="mega-store.js?v=20260314b"></script>
  <script src="shared-search.js?v=20260314g"></script>
</body>
</html>
