name: Workflow Action Governance

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - 'scripts/ci/validate-workflow-actions.ps1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - 'scripts/ci/validate-workflow-actions.ps1'

concurrency:
  group: workflow-action-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce-minimum-action-majors:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate workflow action versions
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\ci\validate-workflow-actions.ps1
