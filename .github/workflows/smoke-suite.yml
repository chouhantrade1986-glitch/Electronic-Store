name: Smoke Suite

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: smoke-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Prepare backend env file
        shell: pwsh
        env:
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BACKEND_ENV_FILE)) {
            Copy-Item -Path backend/.env.example -Destination backend/.env -Force
            Write-Host "BACKEND_ENV_FILE secret not set. Using backend/.env.example for smoke suite."
          } else {
            $env:BACKEND_ENV_FILE | Set-Content -Path backend/.env -Encoding utf8NoBOM
            Write-Host "backend/.env written from BACKEND_ENV_FILE secret."
          }

          $envContents = Get-Content -Path backend/.env -Raw
          $jwtMatch = [regex]::Match($envContents, '(?m)^JWT_SECRET=(.*)$')
          $jwtSecret = if ($jwtMatch.Success) { $jwtMatch.Groups[1].Value.Trim() } else { "" }
          $disallowedJwtSecrets = @("", "dev-secret-change-me", "replace-with-strong-secret", "changeme")
          if ($disallowedJwtSecrets -contains $jwtSecret) {
            $ciJwtSecret = "ci-smoke-" + [guid]::NewGuid().ToString("N")
            if ($jwtMatch.Success) {
              $envContents = $envContents -replace '(?m)^JWT_SECRET=.*$', ("JWT_SECRET=" + $ciJwtSecret)
            } else {
              $envContents = $envContents.TrimEnd() + [Environment]::NewLine + "JWT_SECRET=" + $ciJwtSecret + [Environment]::NewLine
            }
            $envContents | Set-Content -Path backend/.env -Encoding utf8NoBOM
            Write-Host "JWT_SECRET was missing/placeholder. Replaced with generated CI secret."
          }

      - name: Install root smoke dependencies
        shell: pwsh
        run: npm ci

      - name: Install Playwright browsers
        shell: pwsh
        run: npm run smoke:install-browsers

      - name: Install backend dependencies
        shell: pwsh
        working-directory: backend
        run: npm ci

      - name: Run smoke suite
        shell: cmd
        run: run-smoke-suite.bat --reports-dir=qa-reports

      - name: Verify visual baseline
        shell: pwsh
        run: npm run smoke:baseline:verify

      - name: Upload smoke suite reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-suite-reports
          path: qa-reports/
          if-no-files-found: warn
